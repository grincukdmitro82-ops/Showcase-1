name: Build Showcase

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android64:
    name: Build Android64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Install Geode CLI
        run: |
          curl -L https://github.com/geode-sdk/cli/releases/latest/download/geode-cli-linux.zip -o cli.zip
          unzip cli.zip -d cli
          sudo mv cli/geode /usr/local/bin/geode

      - name: Install SDK
        run: |
          geode sdk install --path $HOME/geode-sdk
          geode sdk update --path $HOME/geode-sdk --version 5.0.0

      - name: Build
        run: |
          export GEODE_SDK=$HOME/geode-sdk
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-23
          cmake --build build --config Release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Android64
          path: build/*.geode
