name: Build Showcase

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            platform: win
          - name: Android32
            os: ubuntu-latest
            platform: android32
          - name: Android64
            os: ubuntu-latest
            platform: android64
          - name: iOS
            os: macos-latest
            platform: ios

    name: Build (${{ matrix.config.name }})
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK (Android)
        if: matrix.config.platform == 'android32' || matrix.config.platform == 'android64'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Build
        uses: geode-sdk/build-geode-mod@v2
        with:
          platform: ${{ matrix.config.platform }}
          build-config: Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.name }}
          path: build/*.geode
