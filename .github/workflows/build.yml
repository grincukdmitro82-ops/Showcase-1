name: Build Showcase

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android64:
    name: Build Android64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: "5.0.0"
          target: android64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android64
          path: build/*.geode
