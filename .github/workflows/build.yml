name: Build Showcase

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android64:
    name: Build Android64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Build
        uses: geode-sdk/build-geode-mod@v2
        with:
          platform: android64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android64
          path: build/*.geode
