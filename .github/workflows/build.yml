name: Build Showcase

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Android64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android64
          path: build/*.geode
